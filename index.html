<script>
    function getFBP() {
        const match = document.cookie.match(new RegExp('(^| )_fbp=([^;]+)'));
        return match ? match[2] : '';
    }

    async function carregarTally() {
        const urlParams = new URLSearchParams(window.location.search);
        const valor = urlParams.get('valor') || '';
        const fbclid = urlParams.get('fbclid');
        const fbc = fbclid ? 'fb.1.' + Date.now() + '.' + fbclid : '';
        const ua = navigator.userAgent.substring(0, 150);
        
        // 1. Tenta pegar o IP
        let ip = '';
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            ip = data.ip;
        } catch (e) { console.log("Erro IP"); }

        // 2. Loop para caçar o FBP (tenta por até 4 segundos)
        let fbp = '';
        let tentativas = 0;
        while (!fbp && tentativas < 8) { 
            fbp = getFBP();
            if (!fbp) {
                await new Promise(r => setTimeout(r, 500)); // Espera 500ms
                tentativas++;
            }
        }

        const tallyID = "MedLeX";
        const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;

        document.getElementById('tally-iframe').src = finalURL;
    }

    carregarTally();
</script>
