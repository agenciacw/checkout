<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Seguro - Agência CW</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f9fafb; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>
    <iframe id="tally-iframe" src="about:blank"></iframe>

    <script>
        async function carregarTally() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 1. Pega Valor e FBCLID da URL
            const valor = urlParams.get('valor') || '';
            const fbclid = urlParams.get('fbclid');
            const fbc = fbclid ? 'fb.1.' + Date.now() + '.' + fbclid : '';

            // 2. Pega FBP do Cookie
            const fbp = document.cookie.split('; ').find(row => row.startsWith('_fbp='))?.split('=')[1] || '';

            // 3. Pega o User Agent (Navegador/Dispositivo)
            const ua = navigator.userAgent;

            // 4. Busca o IP real do cliente usando uma API gratuita
            let ip = '';
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) { console.log("Erro ao pegar IP"); }

            // 5. Monta a URL Final do Tally (MedLeX)
            const tallyID = "MedLeX";
            const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;

            // 6. Injeta no Iframe
            document.getElementById('tally-iframe').src = finalURL;
        }

        carregarTally();
    </script>
</body>
</html>
