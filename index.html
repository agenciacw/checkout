<script>
    function getCookie(name) {
        let cookie = {};
        document.cookie.split(';').forEach(function(el) {
            let [key,value] = el.split('=');
            cookie[key.trim()] = value;
        })
        return cookie[name];
    }

    async function carregarTally() {
        const urlParams = new URLSearchParams(window.location.search);
        const valor = urlParams.get('valor') || '';
        const fbclid = urlParams.get('fbclid');
        const fbc = fbclid ? 'fb.1.' + Date.now() + '.' + fbclid : '';
        
        // Tenta pegar o FBP. Se estiver vazio, espera 1 segundo e tenta de novo.
        let fbp = getCookie('_fbp') || '';
        if (!fbp) {
            await new Promise(r => setTimeout(r, 1000));
            fbp = getCookie('_fbp') || '';
        }

        const ua = navigator.userAgent.substring(0, 150);
        let ip = '';
        
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            ip = data.ip;
        } catch (e) { console.log("IP erro"); }

        const tallyID = "MedLeX";
        const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;

        document.getElementById('tally-iframe').src = finalURL;
    }

    // Dá 1 segundo pro Pixel do Facebook respirar antes de começar tudo
    setTimeout(carregarTally, 1000);
</script>
