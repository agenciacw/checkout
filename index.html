<!DOCTYPE html>

    <script>

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f9fafb; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>

    <iframe id="tally-iframe" src="about:blank"></iframe>

    <script>
        async function carregarTally() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 1. Valor e FBC (Vindo do clique do anúncio)
            const valor = urlParams.get('valor') || '';
            const fbclid = urlParams.get('fbclid');
            const fbc = fbclid ? 'fb.1.' + Date.now() + '.' + fbclid : '';

            // 2. FBP (Vindo do Cookie que o Pixel acima acabou de criar)
            const fbp = document.cookie.split('; ').find(row => row.trim().startsWith('_fbp='))?.split('=')[1] || '';

            // 3. User Agent (Navegador)
            const ua = navigator.userAgent.substring(0, 150);

            // 4. IP Real
            let ip = '';
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1000);
                const response = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
                const data = await response.json();
                ip = data.ip;
                clearTimeout(timeoutId);
            } catch (e) { console.log("Timeout IP"); }

            // 5. Montagem da URL para o Tally MedLeX
            const tallyID = "MedLeX";
            const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${fbc}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;

            // 6. Carrega o formulário
            document.getElementById('tally-iframe').src = finalURL;
        }

        // Aguarda 500ms para garantir que o Pixel disparou o cookie antes de ler
        setTimeout(carregarTally, 500);
    </script>
</body>
</html>
